name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install verified core and development dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile and import
        run: |
          python -m compileall -q hyrox src webui tools main.py start_web.py start_public_web.py
          python -m src.import_test
      - name: Text format
        run: python tools/check_text_format.py
      - name: Unit tests
        run: python -m pytest -q
      - name: No-camera smoke test
        run: python -m src.smoke_test
      - name: Build wheel and source distribution
        run: python -m build
